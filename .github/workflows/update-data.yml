name: Update price data

on:
  schedule:
    # 22:30 UTC, Mon-Fri = 6:30pm ET (EDT) / 5:30pm ET (EST) -- after US market close
    - cron: '30 22 * * 1-5'
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch prices
        run: python scripts/fetch_prices.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update price data ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push
